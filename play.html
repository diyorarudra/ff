<body class="font-body" style="background: linear-gradient(135deg, #7361F2 0%, #7C67DD 100%); background-attachment: fixed;">

  <!-- ===== NAVBAR ===== -->

      <div class="hidden md:flex items-center gap-8 font-semibold text-[#111]">
        <a href="/index" class="hover:text-[#7361F2] transition-colors">Home</a>
      </div>
      <div class="flex items-center gap-2 md:gap-4">
        <button id="search-toggle" class="p-2 hover:bg-gray-100 rounded-full transition-colors hidden md:block" aria-label="Search">
          <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>

        <!-- Economy UI -->
        <div class="header-economy hidden lg:flex">

             <span class="icon">🪙</span> <span id="ui-coins">0</span>
          </div>
          <div class="economy-pill text-blue-600 bg-blue-50">
             <span id="ui-streak">🔥 0</span>
          </div>
          <div class="economy-pill">
             <span class="text-xs font-bold" id="ui-xp-text">Lvl 1 - 0/100</span>
             <div class="level-progress-wrap"><div class="level-progress-bar" id="ui-xp-bar" style="width:0%"></div></div>
          </div>
          <select id="lang-select" class="border border-gray-200 rounded-md py-1 px-2 text-xs ml-2 bg-white outline-none cursor-pointer">
              <option value="en">EN</option>
              <option value="hi">HI</option>
              <option value="gu">GU</option>

  <main class="max-w-7xl mx-auto px-4 md:px-8 py-8">

      <!-- Error State -->
      <div id="player-error" class="hidden text-center text-white py-12">
          <h1 id="error-title" class="text-4xl font-bold mb-4 font-heading">Game Not Found</h1>
          <p id="error-desc" class="mb-8">The game you are looking for might have been moved or does not exist.</p>
          <a href="/index" class="px-8 py-3 bg-white text-[#7361F2] rounded-full font-bold shadow-lg hover:shadow-xl transition-all">Back to Home</a>

          <div class="mt-16 text-left">
              <div id="error-recommended-games" class="w-full">
                  <!-- Populated by JS -->
              </div>
          </div>
      </div>

      <!-- Player State -->
      <div id="player-ui" class="hidden player-layout">

          <!-- Main Content Column -->
          <div class="main-column">
              <!-- Title -->
              <h2 id="game-title" class="text-3xl md:text-4xl font-extrabold text-white mb-4 font-heading drop-shadow-md">Loading...</h2>

              <!-- Iframe Container -->
              <div class="iframe-container" id="iframe-container">
                  <div class="play-overlay" id="play-overlay">
                      <button class="play-btn" id="start-game-btn">Play Now</button>
                      <p class="text-white mt-4 font-semibold drop-shadow-md bg-black/40 px-4 py-1.5 rounded-full border border-white/20">Earn <span id="game-reward-coins-banner">10</span> 🪙 every 2 minutes!</p>
                  </div>
                  <!-- Iframe injected via JS -->
              </div>

              <!-- Action Bar -->
              <div class="flex items-center justify-between mt-4 bg-white/10 p-3 rounded-2xl backdrop-blur-sm border border-white/20">
                  <div class="flex items-center gap-3">
                      <button id="btn-fav" class="player-action-btn" title="Add to Favorites">
                          <svg class="w-6 h-6 outline-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                          <svg class="w-6 h-6 solid-icon text-red-500 hidden" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L12 8.343l3.172-3.171a4 4 0 115.656 5.656L12 21.485 3.172 12.828a4 4 0 010-5.656z" clip-rule="evenodd"></path></svg>
                          <span class="text-sm font-bold text-white ml-1 hidden sm:inline" id="txt-fav">Favorite</span>
                      </button>

                      <button id="btn-share" class="player-action-btn" title="Share Game">
                          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                          <span class="text-sm font-bold text-white ml-1 hidden sm:inline" id="txt-share">Share</span>
                      </button>
                  </div>

                  <div class="flex items-center gap-3">
                      <span class="text-white text-sm font-medium mr-2 hidden sm:inline opacity-80" id="game-category">Category</span>
                      <button id="btn-fullscreen" class="player-action-btn bg-white/20 hover:bg-white/30" title="Fullscreen">
                          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                          <span class="text-sm font-bold text-white ml-1 hidden sm:inline" id="txt-fullscreen">Fullscreen</span>
                      </button>
                  </div>
              </div>

              <!-- In-player Ad slot -->
              <div class="mt-6 bg-white/5 rounded-2xl p-4 flex justify-center border border-white/10">
                  <div class="ad-placeholder banner">

                  <div id="related-games" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 md:gap-6">

                  <div class="ad-placeholder native flex items-center justify-center bg-gray-50 border-2 border-dashed border-gray-200 rounded-lg text-gray-400 font-medium h-[250px]">

  <div class="toast-container" id="toast-container"></div>
