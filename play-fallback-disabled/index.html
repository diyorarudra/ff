<!doctype html>

<html>
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PPMK24W61X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-PPMK24W61X');
  </script>
  <meta charset="utf-8">
  <title>Redirecting to Player</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
    var target = "/play.html" + (window.location.search || "");
    document.documentElement.setAttribute("data-target", target);
    window.location.replace(target);
  </script>
</head>
<body style="margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-family:Arial,sans-serif;">
  <div style="padding:30px;text-align:center;border:2px solid #fff;border-radius:16px;">
    <h1 style="font-size:32px;margin:0 0 12px;">Redirecting...</h1>
    <p style="font-size:18px;margin:0 0 18px;">Opening game player.</p>
    <a id="fallback" href="/play.html" style="color:#fff;background:#6d5dfc;padding:12px 20px;border-radius:999px;text-decoration:none;font-weight:bold;">Open Player</a>
  </div>

  <script>
    var target = "/play.html" + (window.location.search || "");
    document.getElementById("fallback").href = target;
    setTimeout(function () {
      window.location.assign(target);
    }, 100);
  </script>

</body>
</html>
